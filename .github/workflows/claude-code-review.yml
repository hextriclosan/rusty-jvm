name: Claude Code Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Opus Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Claude Code review plugin
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git

          plugins: |
            code-review@claude-code-plugins

          # Use strongest coding model
          claude_args: |
            --model claude-opus-4-8

          prompt: |
            Review this pull request like GitHub Copilot Code Review.

            Pull request:
            ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Review only the changes introduced by this PR.

            Look for:
            - correctness bugs
            - logic errors
            - security vulnerabilities
            - race conditions and concurrency problems
            - memory/resource leaks
            - performance regressions
            - API compatibility issues
            - error handling problems
            - architectural issues

            Do NOT comment on:
            - formatting
            - naming preferences
            - subjective style choices
            - minor refactoring opportunities

            Only leave comments when there is a real issue that should be fixed.

            For every finding:
            - explain why it is a problem
            - point to the affected code
            - provide a concrete fix if possible

            If the PR looks good, leave a short approval-style summary.