name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 1 * * *'     # Daily at 01:00 UTC
  workflow_dispatch:        # Manual trigger support

env:
  CARGO_TERM_COLOR: always

jobs:
  should-run:
    runs-on: ubuntu-latest

    outputs:
      run_ci: ${{ steps.check.outputs.run_ci }}

    steps:
      - name: Check whether CI should run
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Non-scheduled runs should always execute CI
            if (context.eventName !== "schedule") {
              core.setOutput("run_ci", "true");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Current HEAD of main
            const { data: branch } = await github.rest.repos.getBranch({
              owner,
              repo,
              branch: "main"
            });

            const currentSha = branch.commit.sha;

            // Current workflow filename (e.g. rust.yml)
            const workflowId =
              context.workflow_ref.split('/').pop().split('@')[0];

            // Previous scheduled workflow runs
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: "schedule",
              status: "completed",
              per_page: 20
            });

            // Exclude current run
            const previousRuns = runs.data.workflow_runs.filter(
              run => run.id !== context.runId
            );

            // Latest successful scheduled run
            const previousSuccess = previousRuns.find(
              run => run.conclusion === "success"
            );

            // First scheduled run ever
            if (!previousSuccess) {
              core.setOutput("run_ci", "true");
              return;
            }

            // Run only if HEAD changed
            core.setOutput(
              "run_ci",
              previousSuccess.head_sha === currentSha ? "false" : "true"
            );

  build-and-test:
    needs: should-run
    if: |
      needs.should-run.outputs.run_ci == 'true'

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --locked --no-fail-fast --jobs 16

  test-on-s390x:
    needs:
      - should-run
      - build-and-test

    if: |
      always() &&
      needs.build-and-test.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule'
      )

    name: build-and-test (linux big-endian)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      # Prebuilt image, produced by the `Build s390x test image` workflow.
      IMAGE: ghcr.io/${{ github.repository_owner }}/rusty-jvm-s390x-test-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Registers binfmt_misc on the host so the amd64 cross-build container can
        # transparently execute s390x binaries (cargo test, java) under emulation.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: s390x

      - name: Lowercase image name
        id: img
        shell: bash
        run: |
          echo "name=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull s390x test environment image
        # The image itself is linux/amd64 (cross-rs toolchain) — it cross-compiles
        # to s390x and executes the resulting binaries via host QEMU/binfmt above.
        shell: bash
        run: |
          if ! docker pull "${{ steps.img.outputs.name }}:latest"; then
            echo "::error::Image ${{ steps.img.outputs.name }}:latest not found in GHCR."
            echo "::error::Run the 'Build s390x test image' workflow once to publish it."
            exit 1
          fi

      - name: Build jni_test_lib for s390x (Big Endian)
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ steps.img.outputs.name }}:latest \
            cargo build --locked -p jni_test_lib --target s390x-unknown-linux-gnu

      - name: Run tests on s390x (Big Endian)
        shell: bash
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ steps.img.outputs.name }}:latest \
            cargo nextest run --workspace --locked --target s390x-unknown-linux-gnu --no-fail-fast --jobs 8

  build-and-test-with-coverage:
    needs:
      - should-run
      - build-and-test

    if: |
      always() &&
      needs.build-and-test.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule'
      )

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov, nextest

      - name: Run tests with coverage
        run: cargo llvm-cov nextest --jobs 16 --locked --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
