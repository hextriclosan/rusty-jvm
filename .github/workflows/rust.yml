name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 1 * * *'     # Daily at 01:00 UTC
  workflow_dispatch:        # Manual trigger support

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --locked --no-fail-fast --jobs 16


  test-on-s390x:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: build-and-test (linux big-endian)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      # Prebuilt image, produced by the `Build s390x test image` workflow.
      IMAGE: ghcr.io/${{ github.repository_owner }}/rusty-jvm-s390x-test-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: s390x

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull s390x test environment image
        run: |
          if ! docker pull "${{ steps.img.outputs.name }}:latest"; then
            echo "::error::Image ${{ steps.img.outputs.name }}:latest not found in GHCR."
            echo "::error::Run the 'Build s390x test image' workflow once to publish it."
            exit 1
          fi

      - name: Build jni_test_lib for s390x (Big Endian)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ steps.img.outputs.name }}:latest \
            cargo build --locked -p jni_test_lib --target s390x-unknown-linux-gnu

      - name: Run tests on s390x (Big Endian)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ steps.img.outputs.name }}:latest \
            cargo nextest run --workspace --locked --target s390x-unknown-linux-gnu --no-fail-fast --jobs 8

  build-and-test-with-coverage:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov, nextest

      - name: Run tests with coverage
        run: cargo llvm-cov nextest --jobs 16 --locked --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
