name: Build s390x test image

# Builds the s390x test environment image and pushes it to GHCR.
# Triggered manually, or automatically when the build context changes on `main`.
on:
  workflow_dispatch:
    inputs:
      no-cache:
        description: "Disable BuildKit cache (force a full rebuild)"
        type: boolean
        default: false
  push:
    branches: [ "main" ]
    paths:
      - ".github/docker/s390x/**"
      - ".github/workflows/s390x-image.yml"

concurrency:
  group: s390x-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/rusty-jvm-s390x-test-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: s390x

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build-context hash
        id: ctx
        # Hash every file in the build context (sorted for determinism) so any change
        # produces a new immutable image tag.
        run: |
          hash=$(LC_ALL=C find .github/docker/s390x -type f -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | cut -c1-12)
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"

      - name: Build and push s390x test environment image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/s390x
          push: true
          no-cache: ${{ (github.event_name == 'workflow_dispatch' && inputs.no-cache == true) || github.event.schedule == '0 3 * * 0' }}
          platforms: linux/s390x
          # `:latest` is only published from `main` so non-main manual runs cannot
          # accidentally overwrite the tag consumed by the CI test job. Other runs
          # still get the immutable `:<hash>` and `:sha-<commit>` tags for testing.
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.ctx.outputs.hash }}
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', steps.img.outputs.name) || '' }}
          cache-from: |
            type=registry,ref=${{ steps.img.outputs.name }}:buildcache
            type=registry,ref=${{ steps.img.outputs.name }}:latest
          cache-to: type=registry,ref=${{ steps.img.outputs.name }}:buildcache,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed image"
            echo ""
            echo "- \`${{ steps.img.outputs.name }}:${{ steps.ctx.outputs.hash }}\`"
            echo "- \`${{ steps.img.outputs.name }}:sha-${{ github.sha }}\`"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "- \`${{ steps.img.outputs.name }}:latest\` (updated)"
            else
              echo ""
              echo "_\`:latest\` was **not** updated — this run is on \`${{ github.ref }}\`, not \`main\`._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

